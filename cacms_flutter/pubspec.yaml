name: cacms_flutter
description: CACMS - Clinic Appointment & Consultation Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3
  go_router: ^13.2.0
  flutter_secure_storage: ^9.0.0
  eventsource: ^0.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
