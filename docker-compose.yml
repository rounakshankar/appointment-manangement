services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cacms
    ports:
      - "5432:5432"
    volumes:
      - cacms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cacms"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cacms
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:8080
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-use-secrets-token-hex-32-chars-min}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  cacms_pgdata:
