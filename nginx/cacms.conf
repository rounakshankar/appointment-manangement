# CACMS Nginx configuration
# Terminates TLS, proxies to FastAPI on localhost:8000
# SSE endpoints get special treatment: buffering disabled, HTTP/1.1 forced

upstream cacms_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP — redirect everything to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge (needed for initial cert issuance)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — TLS termination + reverse proxy
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # Let's Encrypt certificates — replace <domain> with your actual domain
    ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;

    # Modern TLS settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ---------------------------------------------------------------------------
    # SSE endpoints — disable buffering so events reach clients immediately
    # ---------------------------------------------------------------------------
    location /v1/events/ {
        proxy_pass         http://cacms_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        # Disable all buffering for SSE
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         3600s;
        chunked_transfer_encoding  on;
    }

    location /v1/public/events/ {
        proxy_pass         http://cacms_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         3600s;
        chunked_transfer_encoding  on;
    }

    # ---------------------------------------------------------------------------
    # All other requests
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass         http://cacms_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
